name: GatePass quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ADAPTIVE_AI_REGISTRY: "https://registry.npmjs.org/"
      PORT: "3000"
      VITE_APP_ID: "gatepass-ci"
      VITE_BASE_URL: "http://localhost:3000"
      VITE_ROOT_URL: "http://localhost:5173"
      VITE_NODE_ENV: "test"
      VITE_BOX_ID: "gatepass-ci"
      VITE_REALTIME_DOMAIN: "localhost"
      GUEST_SERVICES_URL: "http://localhost"
      DB_FILE_NAME: "file:development.db"
      QUEUE_DB_FILE_NAME: "development-queue.db"
      ERRORS_DB_FILE_NAME: "errors.db"
      API_KEY: "ci-placeholder"
      STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
      RESEND_API_KEY: "re_ci_placeholder"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        id: install
        shell: bash
        run: |
          set +e
          npm install --legacy-peer-deps > npm-install.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Type and configuration check
        id: check
        if: steps.install.outputs.status == '0'
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Lint
        id: lint
        if: steps.install.outputs.status == '0'
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build frontend and API bundles
        id: build
        if: steps.install.outputs.status == '0'
        shell: bash
        run: |
          set +e
          npm run prod:build:vite > build.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatepass-quality-logs
          path: |
            npm-install.log
            check.log
            lint.log
            build.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Require successful quality gate
        shell: bash
        run: |
          failed=0
          for result in \
            "install:${{ steps.install.outputs.status }}" \
            "check:${{ steps.check.outputs.status }}" \
            "lint:${{ steps.lint.outputs.status }}" \
            "build:${{ steps.build.outputs.status }}"
          do
            name="${result%%:*}"
            status="${result#*:}"
            if [ "$status" != "0" ]; then
              echo "$name failed with status ${status:-not-run}"
              failed=1
            fi
          done
          exit "$failed"
