name: GatePass quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PORT: "3000"
      VITE_APP_ID: "gatepass-ci"
      VITE_BASE_URL: "http://localhost:3000"
      VITE_ROOT_URL: "http://localhost:5173"
      VITE_NODE_ENV: "test"
      VITE_BOX_ID: "gatepass-ci"
      VITE_REALTIME_DOMAIN: "localhost"
      GUEST_SERVICES_URL: "http://localhost"
      DB_FILE_NAME: "file:development.db"
      QUEUE_DB_FILE_NAME: "development-queue.db"
      ERRORS_DB_FILE_NAME: "errors.db"
      API_KEY: "ci-placeholder"
      STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
      RESEND_API_KEY: "re_ci_placeholder"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        id: install
        shell: bash
        run: |
          set +e
          npm install --legacy-peer-deps > npm-install.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-log
          path: npm-install.log
          retention-days: 1

      - name: Require successful install
        shell: bash
        run: |
          if [ "${{ steps.install.outputs.status }}" != "0" ]; then
            echo "Dependency installation failed. See npm-install-log artifact."
            exit 1
          fi

      - name: Type and configuration check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build frontend and API bundles
        run: npm run prod:build:vite
